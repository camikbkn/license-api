<!DOCTYPE html>
<html>
<head>
    <title>Panel Licencias</title>
</head>
<body>

<h2>Panel de Licencias</h2>

<div id="panel"></div>

<script>

let data = {
    BR: {
        active: true,
        ips: [
            { ip: "186.23.164.145", desc: "Evento de Tomi" }
        ]
    },
    TVT: {
        active: true,
        ips: [
            { ip: "181.10.10.10", desc: "Evento PvP" }
        ]
    }
};

function render() {
    let panel = document.getElementById("panel");
    panel.innerHTML = "";

    for (let event in data) {
        let div = document.createElement("div");
        div.style.border = "1px solid black";
        div.style.margin = "10px";
        div.style.padding = "10px";

        div.innerHTML = `
            <h3>Evento ${event}</h3>
            <button onclick="activar('${event}')">Activar</button>
            <button onclick="desactivar('${event}')">Desactivar</button>
            
            <br><br>
            <input id="ip_${event}" placeholder="IP">
            <input id="desc_${event}" placeholder="Descripción">
            <button onclick="agregarIP('${event}')">Agregar</button>

            <ul id="lista_${event}"></ul>
        `;

        panel.appendChild(div);

        let lista = div.querySelector(`#lista_${event}`);

        data[event].ips.forEach(obj => {
            let li = document.createElement("li");
            li.textContent = obj.ip + " - " + obj.desc;
            lista.appendChild(li);
        });
    }
}

function agregarIP(evento) {
    let ip = document.getElementById("ip_" + evento).value;
    let desc = document.getElementById("desc_" + evento).value;

    if (!ip) return;

    data[evento].ips.push({ ip, desc });
    render();
}

function activar(evento) {
    data[evento].active = true;
    alert("Evento activado");
}

function desactivar(evento) {
    data[evento].active = false;
    alert("Evento desactivado");
}

render();

</script>

</body>
</html>
